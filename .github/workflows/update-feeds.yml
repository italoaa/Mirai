name: Update RSS feeds

on:
  schedule:
    # GitHub Actions schedules use UTC. This runs every morning in Madrid winter time.
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch RSS feeds
        run: python scripts/update_feeds.py

      - name: Commit updated feed snapshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/feeds.json
          git diff --cached --quiet || git commit -m "Update RSS feeds"
          git push
